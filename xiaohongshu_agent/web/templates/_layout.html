<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}小红书 AI Agent{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="app-shell">
      <aside class="app-sidebar" aria-label="主导航">
        <div class="app-brand">
          <div class="app-brand__mark">XHS</div>
          <div class="app-brand__text">
            <div class="app-brand__title">小红书 AI Agent</div>
            <div class="app-brand__sub">Web 控制台</div>
          </div>
        </div>

        <nav class="app-nav">
          <a class="app-nav__item {% if request.path == '/' %}is-active{% endif %}" href="/">
            <i class="bi bi-speedometer2"></i>
            <span>控制台</span>
          </a>
          <a class="app-nav__item {% if request.path.startswith('/video') %}is-active{% endif %}" href="/video">
            <i class="bi bi-camera-video"></i>
            <span>视频工作流</span>
          </a>
        </nav>

        <div class="app-sidebar__footer">
          <div class="app-kv">
            <div class="app-kv__k">服务</div>
            <div class="app-kv__v" id="appHealthText">未检测</div>
          </div>
          <button class="btn btn-sm btn-outline-light w-100" id="appHealthBtn" type="button">
            <i class="bi bi-heart-pulse"></i> 检测后端
          </button>
        </div>
      </aside>

      <div class="app-main">
        <header class="app-topbar">
          <button class="btn btn-sm btn-outline-secondary app-topbar__burger" id="appBurger" type="button" aria-label="打开导航">
            <i class="bi bi-list"></i>
          </button>
          <div class="app-topbar__title">
            {% block topbar_title %}控制台{% endblock %}
          </div>
          <div class="app-topbar__actions">
            {% block topbar_actions %}{% endblock %}
          </div>
        </header>

        <main class="app-content">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    <div class="toast-container position-fixed top-0 end-0 p-3" id="toastRoot" aria-live="polite" aria-atomic="true"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
