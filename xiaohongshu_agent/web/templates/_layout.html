<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}小红书 AI Agent{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}" />
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="app-shell">
      <!-- 侧边栏 -->
      <aside class="app-sidebar" id="sidebar">
        <div class="app-brand">
          <div class="app-brand__mark">
            <i class="bi bi-magic"></i>
          </div>
          <div class="app-brand__title">小红书 AI</div>
          <div class="app-brand__sub">智能运营助手</div>
        </div>

        <nav class="app-nav">
          <div class="app-nav__section">
            <div class="app-nav__section-title">主要功能</div>
            <a class="app-nav__item {% if request.path == '/' %}is-active{% endif %}" href="/">
              <i class="bi bi-chat-dots"></i>
              <span>AI 对话</span>
            </a>
            <a class="app-nav__item {% if request.path == '/video' %}is-active{% endif %}" href="/video">
              <i class="bi bi-camera-video"></i>
              <span>视频工作流</span>
            </a>
          </div>

          <div class="app-nav__section">
            <div class="app-nav__section-title">快捷操作</div>
            <a class="app-nav__item" href="#" onclick="quickAction('generate')">
              <i class="bi bi-stars"></i>
              <span>生成内容</span>
            </a>
            <a class="app-nav__item" href="#" onclick="quickAction('search')">
              <i class="bi bi-search"></i>
              <span>搜索热点</span>
            </a>
            <a class="app-nav__item" href="#" onclick="quickAction('publish')">
              <i class="bi bi-send"></i>
              <span>发布笔记</span>
            </a>
          </div>
        </nav>

        <div class="app-sidebar__footer">
          <div class="status-badge {% if False %}success{% else %}warning{% endif %}" id="healthBadge">
            <span id="healthText">检测中...</span>
          </div>
          <button class="btn btn-sm btn-secondary w-100 mt-2" onclick="checkHealth()">
            <i class="bi bi-arrow-clockwise"></i> 检查状态
          </button>
        </div>
      </aside>

      <!-- 主内容 -->
      <div class="app-main">
        <header class="app-topbar">
          <button class="btn btn-ghost" id="sidebarToggle">
            <i class="bi bi-list"></i>
          </button>
          <div class="app-topbar__title">
            {% block topbar_title %}AI 对话{% endblock %}
          </div>
          <div class="app-topbar__actions">
            <button class="btn btn-ghost btn-sm" onclick="clearMemory()">
              <i class="bi bi-trash"></i> 清空记忆
            </button>
          </div>
        </header>

        <main class="app-content">
          {% block content %}{% endblock %}
        </main>
      </div>
    </div>

    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script>
      // 侧边栏切换
      document.getElementById('sidebarToggle').addEventListener('click', function() {
        document.getElementById('sidebar').classList.toggle('is-open');
      });

      // 健康检查
      async function checkHealth() {
        try {
          const res = await fetch('/api/health');
          const data = await res.json();
          const badge = document.getElementById('healthBadge');
          const text = document.getElementById('healthText');

          if (data.status === 'healthy') {
            badge.className = 'status-badge success';
            text.textContent = '服务正常';
          } else {
            badge.className = 'status-badge warning';
            text.textContent = '服务异常';
          }
        } catch (e) {
          document.getElementById('healthText').textContent = '连接失败';
        }
      }

      // 快捷操作
      function quickAction(action) {
        const event = new CustomEvent('quickAction', { detail: action });
        window.dispatchEvent(event);
      }

      // Toast 通知
      function showToast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
          <i class="bi bi-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
          <span>${message}</span>
        `;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      // 清空记忆
      async function clearMemory() {
        if (confirm('确定要清空对话记忆吗？')) {
          try {
            await fetch('/api/memory/clear', { method: 'POST' });
            showToast('记忆已清空', 'success');
            location.reload();
          } catch (e) {
            showToast('清空失败', 'error');
          }
        }
      }

      // 页面加载时检查健康状态
      checkHealth();
    </script>
    {% block scripts %}{% endblock %}
  </body>
</html>
